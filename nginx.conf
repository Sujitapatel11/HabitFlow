worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
  worker_connections 4096;
  use epoll;
  multi_accept on;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  # ── Logging ────────────────────────────────────────────────────────────────
  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" rt=$request_time';
  access_log /var/log/nginx/access.log main;

  # ── Performance ────────────────────────────────────────────────────────────
  sendfile        on;
  tcp_nopush      on;
  tcp_nodelay     on;
  keepalive_timeout 65;
  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
  gzip_min_length 1024;

  # ── Rate limiting zones ────────────────────────────────────────────────────
  limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
  limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;

  # ── Backend upstream — round-robin across all backend instances ────────────
  upstream backend {
    least_conn;
    server backend:3001;
    # Docker Compose scale adds backend_2, backend_3 etc automatically
    # For static multi-instance: add more server lines here
    keepalive 32;
  }

  server {
    listen 80;
    server_name _;

    # ── Security headers ────────────────────────────────────────────────────
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy strict-origin-when-cross-origin;

    # ── Angular SPA static files ────────────────────────────────────────────
    root /usr/share/nginx/html;
    index index.html;

    location / {
      try_files $uri $uri/ /index.html;
      expires 1h;
      add_header Cache-Control "public, must-revalidate";
    }

    # Cache hashed assets forever
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
      expires 1y;
      add_header Cache-Control "public, immutable";
    }

    # ── API proxy ───────────────────────────────────────────────────────────
    location /api/ {
      limit_req zone=api burst=50 nodelay;

      proxy_pass         http://backend;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_set_header   Connection        "";

      proxy_connect_timeout 10s;
      proxy_send_timeout    30s;
      proxy_read_timeout    30s;
    }

    # Stricter rate limit on auth endpoints
    location /api/auth/ {
      limit_req zone=auth burst=10 nodelay;

      proxy_pass         http://backend;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_set_header   Connection        "";
    }

    # ── Socket.io WebSocket proxy ───────────────────────────────────────────
    location /socket.io/ {
      proxy_pass         http://backend;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade    $http_upgrade;
      proxy_set_header   Connection "upgrade";
      proxy_set_header   Host       $host;
      proxy_set_header   X-Real-IP  $remote_addr;
      proxy_read_timeout 3600s;  # keep WS alive
      proxy_send_timeout 3600s;
    }

    # ── Prometheus metrics (restrict to internal only) ──────────────────────
    location /metrics {
      allow 10.0.0.0/8;
      allow 172.16.0.0/12;
      allow 127.0.0.1;
      deny all;

      proxy_pass http://backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
    }
  }
}
