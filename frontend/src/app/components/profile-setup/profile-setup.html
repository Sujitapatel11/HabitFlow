<div class="overlay">
  <div class="modal">
    <div class="modal-brand">
      <span>✦</span> HabitFlow
    </div>
    <h2>Set up your profile</h2>
    <p class="modal-sub">Tell us about yourself to connect with people who share your goals.</p>

    @if (error()) { <div class="error-banner">{{ error() }}</div> }

    <form (ngSubmit)="submit()">
      <div class="form-group">
        <label>Your Name *</label>
        <input type="text" [(ngModel)]="name" name="name" placeholder="e.g. Rahul Sharma" />
      </div>
      <div class="form-group">
        <label>Primary Goal</label>
        <div class="goals-grid">
          @for (g of goals; track g) {
            <button type="button" class="goal-chip" [class.selected]="goalCategory === g" (click)="goalCategory = g">
              {{ g }}
            </button>
          }
        </div>
      </div>
      <div class="form-group">
        <label>Bio (optional)</label>
        <input type="text" [(ngModel)]="bio" name="bio" placeholder="A short intro about yourself..." />
      </div>
      <button type="submit" class="btn-submit" [disabled]="loading()">
        {{ loading() ? 'Saving...' : 'Get Started →' }}
      </button>
    </form>
  </div>
</div>
