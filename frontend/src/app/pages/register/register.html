<div class="auth-page">
  <div class="auth-card">
    <div class="auth-brand">
      <span class="brand-icon">✦</span>
      <span class="brand-name">HabitFlow</span>
    </div>
    <h1>Create account</h1>
    <p class="auth-sub">Start building better habits with your community.</p>

    @if (error()) { <div class="error-banner">{{ error() }}</div> }

    <form (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" [(ngModel)]="name" name="name" placeholder="Your name" />
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" [(ngModel)]="email" name="email" placeholder="you@example.com" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" [(ngModel)]="password" name="password" placeholder="Min 6 characters" />
      </div>
      <div class="form-group">
        <label>Primary Goal</label>
        <div class="goals-grid">
          @for (goal of allGoals; track goal) {
            <button
              type="button"
              class="goal-chip"
              [class.selected]="goalCategory === goal"
              (click)="goalCategory = goal"
            >{{ goal }}</button>
          }
        </div>
      </div>
      <button type="submit" class="btn-submit" [disabled]="loading()">
        {{ loading() ? 'Creating account...' : 'Create Account' }}
      </button>
    </form>
  </div>
</div>
