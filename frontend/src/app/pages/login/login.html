<div class="auth-page">
  <div class="auth-card">
    <div class="brand">
      <span class="brand-icon">✦</span>
      <span class="brand-name">HabitFlow</span>
    </div>

    <div class="tabs">
      <button class="tab" [class.active]="mode() === 'login'" (click)="switchMode('login')">Log In</button>
      <button class="tab" [class.active]="mode() === 'register'" (click)="switchMode('register')">Create Account</button>
    </div>

    @if (error()) {
      <div class="error-banner">{{ error() }}</div>
    }

    @if (mode() === 'login') {
      <form (ngSubmit)="login()">
        <div class="form-group">
          <label>Email</label>
          <input type="email" [(ngModel)]="email" name="email" placeholder="you@example.com" autocomplete="email" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" [(ngModel)]="password" name="password" placeholder="••••••••" autocomplete="current-password" />
        </div>
        <button type="submit" class="btn-submit" [disabled]="loading()">
          {{ loading() ? 'Logging in...' : 'Log In' }}
        </button>
      </form>
      <p class="switch-hint">Don't have an account? <button class="link-btn" (click)="switchMode('register')">Create one</button></p>
    }

    @if (mode() === 'register') {
      <form (ngSubmit)="register()">
        <div class="form-group">
          <label>Your Name *</label>
          <input type="text" [(ngModel)]="name" name="name" placeholder="e.g. Rahul Sharma" />
        </div>
        <div class="form-group">
          <label>Email *</label>
          <input type="email" [(ngModel)]="regEmail" name="regEmail" placeholder="you@example.com" autocomplete="email" />
        </div>
        <div class="form-group">
          <label>Password * <span class="hint">(min 6 characters)</span></label>
          <input type="password" [(ngModel)]="regPassword" name="regPassword" placeholder="••••••••" autocomplete="new-password" />
        </div>
        <div class="form-group">
          <label>Primary Goal</label>
          <div class="goals-grid">
            @for (g of goals; track g) {
              <button type="button" class="goal-chip" [class.selected]="goalCategory === g" (click)="goalCategory = g">
                {{ g }}
              </button>
            }
          </div>
        </div>
        <div class="form-group">
          <label>Bio <span class="hint">(optional)</span></label>
          <input type="text" [(ngModel)]="bio" name="bio" placeholder="A short intro about yourself..." />
        </div>
        <button type="submit" class="btn-submit" [disabled]="loading()">
          {{ loading() ? 'Creating account...' : 'Create Account →' }}
        </button>
      </form>
      <p class="switch-hint">Already have an account? <button class="link-btn" (click)="switchMode('login')">Log in</button></p>
    }
  </div>
</div>
