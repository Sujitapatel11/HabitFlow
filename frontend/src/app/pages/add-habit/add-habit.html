<div class="add-habit-page">
  <div class="form-card">
    <div class="form-header">
      <a routerLink="/habits" class="back-link">← Back</a>
      <h1>Add New Habit</h1>
      <p class="subtitle">Define a habit you want to build consistently.</p>
    </div>

    @if (success()) {
      <div class="success-banner">
        ✅ Habit created! Redirecting...
      </div>
    } @else {
      <form (ngSubmit)="onSubmit()" #habitForm="ngForm">
        @if (error()) {
          <div class="error-banner">{{ error() }}</div>
        }

        <div class="form-group">
          <label for="name">Habit Name <span class="required">*</span></label>
          <input
            id="name"
            type="text"
            [(ngModel)]="form.name"
            name="name"
            placeholder="e.g. Morning run, Read 20 pages..."
            maxlength="100"
            autocomplete="off"
          />
        </div>

        <div class="form-group">
          <label for="description">Description <span class="optional">(optional)</span></label>
          <textarea
            id="description"
            [(ngModel)]="form.description"
            name="description"
            placeholder="Why is this habit important to you?"
            rows="3"
            maxlength="300"
          ></textarea>
        </div>

        <div class="form-group">
          <label for="category">Category</label>
          <select id="category" [(ngModel)]="form.category" name="category">
            @for (cat of categories; track cat) {
              <option [value]="cat">{{ cat }}</option>
            }
          </select>
        </div>

        <button type="submit" class="btn-submit" [disabled]="submitting()">
          {{ submitting() ? 'Creating...' : 'Create Habit' }}
        </button>
      </form>
    }
  </div>
</div>
